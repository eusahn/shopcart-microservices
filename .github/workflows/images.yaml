name: build-images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "proto/**"
      - "frontend/**"
      - "Dockerfile"
      - "frontend/Dockerfile"
      - ".github/workflows/images.yaml"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { image: api-gateway,          dockerfile: Dockerfile,          build_args: "SERVICE=api-gateway" }
          - { image: catalog-service,      dockerfile: Dockerfile,          build_args: "SERVICE=catalog-service" }
          - { image: cart-service,         dockerfile: Dockerfile,          build_args: "SERVICE=cart-service" }
          - { image: user-service,         dockerfile: Dockerfile,          build_args: "SERVICE=user-service" }
          - { image: order-service,        dockerfile: Dockerfile,          build_args: "SERVICE=order-service" }
          - { image: inventory-service,    dockerfile: Dockerfile,          build_args: "SERVICE=inventory-service" }
          - { image: payment-service,      dockerfile: Dockerfile,          build_args: "SERVICE=payment-service" }
          - { image: notification-service, dockerfile: Dockerfile,          build_args: "SERVICE=notification-service" }
          - { image: frontend,             dockerfile: frontend/Dockerfile, build_args: "" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.image }}

  bump-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tags in values files
        run: |
          SHA=$(git rev-parse --short HEAD)
          for f in platform/helm/values/*.yaml; do
            svc=$(basename "$f" .yaml)
            sed -i.bak -E \
              "s|repository: shopcart/${svc}.*|repository: ghcr.io/${{ github.repository_owner }}/${svc}|" \
              "$f"
            sed -i.bak -E "s|tag: \".*\"|tag: \"${SHA}\"|" "$f"
            rm -f "$f.bak"
          done
      - name: Commit bump
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          if ! git diff --quiet; then
            git add platform/helm/values
            git commit -m "ci: bump images to $(git rev-parse --short HEAD~1)"
            git push
          fi
