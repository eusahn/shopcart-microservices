# Local dev data plane: Postgres, Redis, Kafka (KRaft single-broker).
# Brings up just enough to run the Node services on the host pointing at these.
# Not used by minikube — that path uses the operator-backed installs in platform/.

services:
  catalog-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    ports: ["55432:5432"]
    healthcheck: { test: ["CMD", "pg_isready", "-U", "catalog"], interval: 2s, retries: 10 }

  order-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orderdb
      POSTGRES_PASSWORD: orderdb
      POSTGRES_DB: orderdb
    ports: ["55433:5432"]
    healthcheck: { test: ["CMD", "pg_isready", "-U", "orderdb"], interval: 2s, retries: 10 }

  inventory-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    ports: ["55434:5432"]
    healthcheck: { test: ["CMD", "pg_isready", "-U", "inventory"], interval: 2s, retries: 10 }

  redis:
    image: redis:7-alpine
    ports: ["56379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 2s, retries: 10 }

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    ports: ["8181:8080"]
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: "/"
    volumes:
      - ./platform/keycloak/shopcart-realm.json:/opt/keycloak/data/import/shopcart-realm.json:ro

  kafka:
    image: apache/kafka:3.8.0
    ports: ["59092:19092"]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:59092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
