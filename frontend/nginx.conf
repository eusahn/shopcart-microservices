server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: hand non-asset routes back to index.html
  location / {
    try_files $uri /index.html;
  }

  # Hashed static assets: cache forever
  location ~* \.(?:js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse-proxy /api to the gateway so the browser uses a single origin.
  # The cluster Ingress can also fan this out independently if preferred.
  location /api/ {
    proxy_pass http://api-gateway.shopcart.svc.cluster.local:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Lightweight health endpoint for k8s probes
  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
