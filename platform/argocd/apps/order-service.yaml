apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  project: shopcart
  source:
    repoURL: https://github.com/eusahn/shopcart-microservices.git
    targetRevision: main
    path: platform/helm/service
    helm:
      valueFiles:
        - ../values/order-service.yaml
  destination: { server: https://kubernetes.default.svc, namespace: shopcart }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
