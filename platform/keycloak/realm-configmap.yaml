apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: platform
data:
  shopcart-realm.json: |
    {
      "realm": "shopcart",
      "enabled": true,
      "registrationAllowed": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "accessTokenLifespan": 1800,
      "clients": [
        {
          "clientId": "shopcart-web",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": ["http://localhost:5173/*", "http://localhost:5174/*", "http://localhost:4173/*", "http://shop.local/*"],
          "webOrigins": ["+"],
          "attributes": { "pkce.code.challenge.method": "S256", "post.logout.redirect.uris": "+" }
        }
      ],
      "users": [
        {
          "username": "demo",
          "email": "demo@example.com",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "demo", "temporary": false }],
          "realmRoles": ["default-roles-shopcart"]
        }
      ]
    }
