syntax = "proto3";

package events.v1;

// Kafka event envelopes. Topics:
//   orders.events       -> OrderPlaced, OrderCancelled
//   inventory.events    -> InventoryReserved, InventoryReleased, InventoryOutOfStock
//   payments.events     -> PaymentCaptured, PaymentFailed
//   notifications.events -> NotificationDispatched

message EventMetadata {
  string event_id = 1;
  string correlation_id = 2;
  string traceparent = 3;          // W3C trace context for distributed tracing
  int64 occurred_at_unix = 4;
  string producer = 5;
}

message OrderLine {
  string product_id = 1;
  string sku = 2;
  int32 quantity = 3;
  int64 unit_price_cents = 4;
}

message OrderPlaced {
  EventMetadata meta = 1;
  string order_id = 2;
  string user_id = 3;
  repeated OrderLine lines = 4;
  int64 total_cents = 5;
  string currency = 6;
}

message OrderCancelled {
  EventMetadata meta = 1;
  string order_id = 2;
  string reason = 3;
}

message InventoryReserved {
  EventMetadata meta = 1;
  string order_id = 2;
}

message InventoryReleased {
  EventMetadata meta = 1;
  string order_id = 2;
}

message InventoryOutOfStock {
  EventMetadata meta = 1;
  string order_id = 2;
  repeated string product_ids = 3;
}

message PaymentCaptured {
  EventMetadata meta = 1;
  string order_id = 2;
  string payment_id = 3;
  int64 amount_cents = 4;
}

message PaymentFailed {
  EventMetadata meta = 1;
  string order_id = 2;
  string reason = 3;
}

message NotificationDispatched {
  EventMetadata meta = 1;
  string order_id = 2;
  string channel = 3;        // "email" | "sms"
  string template = 4;
}
